<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> 
  <title>Product preview card component</title>

 
  <style>
   body {
    background-color: hsl(30, 38%, 92%);
    position: relative;
    width: 100%;
    font-family: "Fraunces", serif;
    
   }

   .container {
    width: 400px;
    height:fit-content;
    display: flex;
    /* margin: 0 auto; */
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,50%);

   }

   .product-image {
    width: 50%;
    border-radius: 10px 0 0 10px;

   }

   .product-details {
    width: 50%;
    display: flex;
    flex-direction: column;
    background-color: hsl(0, 0%, 100%);
    padding: 20px;
    gap: 15px;
    box-sizing: border-box;
    border-radius: 0 10px 10px 0;
   }

   .product-category {
    font-size: 10px;
    color: hsl(228, 12%, 48%);
    font-family: "Montserrat", sans-serif;
   }

   .product-name {
    font-weight: bold;
    font-size: 20px;
   }


   .product-description {
    font-size: 10px;
    color: hsl(228, 12%, 48%);
    font-family: "Montserrat", sans-serif;
   }

   
  </style>
</head>
<body>

  <div class="container">
  <div class="product-image">
    <img src="./images/image-product-desktop.jpg" width="200" height="300" >

  </div>
  <div class="product-details">
  <div class="product-category">
  PERFUME
  </div>
  <div class="product-name">
  Gabrielle Essence Eau De Parfum
 </div>

 <div class="product-description">
  A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.
 </div>

  <div>
  $149.99
  $169.99
  </div>
  
  <div>
  Add to Cart
  </div>
</div>
</div>
 
</body>
</html>
